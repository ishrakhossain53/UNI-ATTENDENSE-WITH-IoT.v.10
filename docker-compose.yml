services:
  postgres:
    image: postgres:14
    container_name: attendance_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - attendance-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6-alpine
    container_name: attendance_redis
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - attendance-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: attendance_mosquitto
    ports:
      - "${MQTT_PORT}:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - attendance-net
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -t healthcheck -m ok -q 0 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./web-app/backend
      dockerfile: Dockerfile
    container_name: attendance_backend
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS}
      AES_KEY: ${AES_KEY}
      MQTT_BROKER: ${MQTT_BROKER}
      MQTT_PORT: ${MQTT_PORT}
      BACKEND_URL: ${BACKEND_URL}
      DEVICE_SERVICE_TOKEN: ${DEVICE_SERVICE_TOKEN}
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - attendance-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./web-app/frontend
      dockerfile: Dockerfile
    container_name: attendance_frontend
    environment:
      VITE_API_BASE_URL: http://backend:8000
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    networks:
      - attendance-net

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: attendance_gateway
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      MQTT_BROKER: ${MQTT_BROKER}
      MQTT_PORT: ${MQTT_PORT}
      BACKEND_URL: ${BACKEND_URL}
      DEVICE_SERVICE_TOKEN: ${DEVICE_SERVICE_TOKEN}
      AES_KEY: ${AES_KEY}
      SYNC_POLL_INTERVAL: ${SYNC_POLL_INTERVAL}
    depends_on:
      mosquitto:
        condition: service_healthy
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - attendance-net

  attendance-device:
    build:
      context: ./attendance-device
      dockerfile: Dockerfile
    container_name: attendance_device
    environment:
      MQTT_BROKER: ${MQTT_BROKER}
      MQTT_PORT: ${MQTT_PORT}
      BACKEND_URL: ${BACKEND_URL}
      DEVICE_SERVICE_TOKEN: ${DEVICE_SERVICE_TOKEN}
      AES_KEY: ${AES_KEY}
      ESP32_SCAN_INTERVAL_MIN: ${ESP32_SCAN_INTERVAL_MIN}
      ESP32_SCAN_INTERVAL_MAX: ${ESP32_SCAN_INTERVAL_MAX}
    depends_on:
      mosquitto:
        condition: service_healthy
      gateway:
        condition: service_started
    networks:
      - attendance-net

networks:
  attendance-net:
    driver: bridge

volumes:
  postgres_data:
